<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkBot AI | Centro de Soporte ServiCentro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIABLES DE IDENTIDAD CORPORATIVA
           ========================================= */
        :root {
            --primary: #0A2540;       /* Azul Oscuro */
            --accent: #00D4FF;        /* Cian Eléctrico */
            --accent-hover: #00b8de;
            --bg-chat: #FFFFFF;
            --bg-user-msg: #0A2540;   /* Mensajes del usuario corporativos */
            --bg-bot-msg: #F6F9FC;    /* Mensajes del bot limpios */
            --text-main: #425466;
            --text-dark: #0A2540;
            --border-light: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body { 
            background: transparent;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: var(--bg-chat);
            display: flex;
            flex-direction: column;
            border-radius: 24px;
            overflow: hidden;
        }

        /* =========================================
           HEADER NATIVO Y PROFESIONAL
           ========================================= */
        .chat-header {
            background: var(--primary);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--accent);
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(0, 212, 255, 0.25);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .brand-info {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            color: white;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .verified-badge {
            color: var(--accent);
            width: 14px;
            height: 14px;
        }

        .brand-status {
            color: rgba(255,255,255,0.65);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 1px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 6px #10B981;
        }

        /* Botón de limpiar chat */
        .header-actions {
            margin-left: auto;
        }
        
        .clear-chat-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .clear-chat-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        /* =========================================
           ÁREA DE DISCUSIÓN (CUERPO)
           ========================================= */
        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #FFFFFF;
        }

        .message-row {
            display: flex;
            max-width: 88%;
            animation: fadeIn 0.25s ease-out forwards;
        }

        .message-row.bot { align-self: flex-start; }
        .message-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-row.bot .bubble {
            background: var(--bg-bot-msg);
            color: var(--text-dark);
            border: 1px solid var(--border-light);
            border-top-left-radius: 4px;
        }

        .message-row.user .bubble {
            background: var(--bg-user-msg);
            color: white;
            border-top-right-radius: 4px;
        }

        .bubble strong { font-weight: 700; color: var(--primary); }
        .message-row.user .bubble strong { color: white; }
        .bubble br { margin-bottom: 6px; }

        /* =========================================
           BOTONES DE CONSULTA RÁPIDA (CHIPS)
           ========================================= */
        .quick-chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
            align-self: flex-start;
        }

        .chip-btn {
            background: #FFFFFF;
            color: var(--primary);
            border: 1px solid var(--accent);
            padding: 8px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* =========================================
           ZONA DE ENTRADA DE TEXTO
           ========================================= */
        .chat-footer {
            padding: 14px 20px;
            background: white;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-light);
            border-radius: 24px;
            font-size: 13.5px;
            outline: none;
            background: #F8FAFC;
            transition: all 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
        }

        .action-send {
            background: var(--accent);
            color: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .action-send:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .action-send svg {
            width: 16px;
            height: 16px;
            margin-left: 2px;
        }

        .typing-box {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg-bot-msg);
            border-radius: 16px;
            border-top-left-radius: 4px;
            border: 1px solid var(--border-light);
            width: fit-content;
        }

        .typing-dot {
            width: 6px; height: 6px; background: var(--text-main); border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .chat-body::-webkit-scrollbar { width: 5px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="chat-container">
        
        <div class="chat-header">
            <div class="header-meta">
                <div class="brand-avatar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"></path>
                        <path d="M13 11l-3 4h4l-2 4" stroke="var(--primary)" stroke-width="2"></path>
                    </svg>
                </div>
                <div class="brand-info">
                    <div class="brand-name">
                        SparkBot AI
                        <svg class="verified-badge" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <div class="brand-status">
                        <div class="status-dot"></div>
                        Ingeniería ServiCentro Machala
                    </div>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="clear-chat-btn" onclick="clearChat()" title="Borrar historial de chat">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>
        </div>

        <div class="chat-body" id="chatBody"></div>

        <div class="chat-footer">
            <input type="text" id="userInput" class="input-field" placeholder="Escribe tu consulta o síntoma técnico..." onkeypress="checkEnter(event)" autocomplete="off">
            <button class="action-send" onclick="handleProcess()" title="Enviar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN EXACTA DE LA API Y REGLAS
        // ==========================================
        const GROQ_API_KEY = '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'; 
        
        const CONTEXT_PROMPT = `
            Eres "SparkBot AI", el ingeniero asistente virtual e inteligente de la empresa ServiCentro, ubicada en Machala, El Oro, Ecuador.
            Tu campo de acción es exclusivo y riguroso. Solo das soporte y asesoría sobre: ingeniería eléctrica, sistemas de bombeo, tableros de transferencia, automatización y motores industriales. Trabajas con marcas certificadas como WEG, Pedrollo, Siemens y Schneider Electric.
            
            REGLAS DE COMPORTAMIENTO CORPORATIVO:
            1 Se formal
        `;

        const STORAGE_KEY = 'servicentro_persistent_session';

        let chatLogs = [];
        const chatBody = document.getElementById('chatBody');
        const userInput = document.getElementById('userInput');

        // Inicializar
        window.onload = () => {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                chatLogs = JSON.parse(savedData);
                renderAllLogs();
            } else {
                initWelcomeMessage();
            }
        };

        function initWelcomeMessage() {
            const welcomeText = "¡Bienvenido al Centro de Asistencia Técnica de **ServiCentro**! 🛠️\n\nSoy SparkBot AI, ingeniero de soporte virtual. ¿Qué anomalía presenta tu sistema o qué requerimiento eléctrico industrial tienes hoy?";
            chatLogs.push({ role: 'bot', text: welcomeText, hasChips: true });
            saveLogs();
            renderAllLogs();
        }

        // Función para limpiar el chat
        function clearChat() {
            if (confirm("¿Estás seguro de que deseas borrar el historial de tu conversación?")) {
                localStorage.removeItem(STORAGE_KEY);
                chatLogs = [];
                initWelcomeMessage();
            }
        }

        function saveLogs() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatLogs));
        }

        function formatMarkdown(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                       .replace(/\*(.*?)\*/g, '<em>$1</em>')
                       .replace(/\n/g, '<br>');
        }

        function renderAllLogs() {
            chatBody.innerHTML = '';
            chatLogs.forEach((log) => {
                const row = document.createElement('div');
                row.className = `message-row ${log.role}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = formatMarkdown(log.text);
                
                row.appendChild(bubble);
                chatBody.appendChild(row);

                if (log.hasChips && log.role === 'bot') {
                    renderQuickChips();
                }
            });
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function renderQuickChips() {
            const container = document.createElement('div');
            container.className = 'quick-chips-container';
            
            const options = [
                "La bomba hace un ruido extraño",
                "¿Qué marcas de motores distribuyen?",
                "¿Dónde están ubicados en Machala?"
            ];

            options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'chip-btn';
                btn.innerText = optionText;
                btn.onclick = () => {
                    userInput.value = optionText;
                    handleProcess();
                };
                container.appendChild(btn);
            });
            chatBody.appendChild(container);
        }

        function renderTyping() {
            const row = document.createElement('div');
            row.className = 'message-row bot';
            row.id = 'typingIndicator';
            row.innerHTML = `
                <div class="typing-box">
                    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                </div>
            `;
            chatBody.appendChild(row);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function removeTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function handleProcess() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            chatLogs.push({ role: 'user', text: prompt });
            userInput.value = '';
            renderAllLogs();
            renderTyping();

            try {
                let apiMessages = [{ role: "system", content: CONTEXT_PROMPT }];
                chatLogs.forEach(log => {
                    apiMessages.push({
                        role: log.role === 'user' ? 'user' : 'assistant',
                        content: log.text
                    });
                });

                const endpoint = "https://api.groq.com/openai/v1/chat/completions";
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: apiMessages,
                        temperature: 0.25,
                        max_tokens: 800
                    })
                });

                removeTyping();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const payload = await response.json();
                const aiResponse = payload.choices[0].message.content;

                chatLogs.push({ role: 'bot', text: aiResponse });
                saveLogs();
                renderAllLogs();

            } catch (error) {
                removeTyping();
                console.error("Error en conexión:", error);
                const errorNotice = "⚠️ **Aviso técnico:** No he podido conectar con el servidor de IA de Groq. Por favor, asegúrate de tener conexión a Internet.";
                chatLogs.push({ role: 'bot', text: errorNotice });
                renderAllLogs();
            }
        }

        function checkEnter(e) {
            if (e.key === 'Enter') {
                handleProcess();
            }
        }
    </script>
</body>
</html>
